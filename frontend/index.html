<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康与医疗智能问答系统</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="vue-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>对话历史</span>
    </div>
    <button class="sidebar-new-btn" @click="newConversation">+ 新建对话</button>
    <div class="sidebar-list" @scroll="onSidebarScroll">
      <div class="empty-conv" v-if="conversations.length===0">暂无对话记录</div>
      <div v-for="c in conversations" :key="c.id"
           class="sidebar-item" :class="{active:convId===c.id}"
           @click="switchConv(c.id)">
        <div class="conv-info">
          <div class="conv-title">{{ c.title }}</div>
          <div class="conv-time">{{ fmtTime(c.updated_at) }}</div>
        </div>
        <span class="conv-del" @click.stop="deleteConv(c.id)">&#x2715;</span>
      </div>
    </div>
  </div>

  <div class="main-area">
    <div class="app-header">
      <div class="user-bar">
        <span class="user-name" v-if="user">{{ user.username }}</span>
        <button class="logout-btn" @click="doLogout">退出登录</button>
      </div>
      <h1><span class="icon">+</span>健康与医疗智能问答</h1>
      <div class="subtitle">基于流式管线与RAG检索增强 · 语音交互</div>
    </div>

    <div class="mode-bar">
      <div v-for="m in modes" :key="m.key"
           class="mode-btn" :class="{active:wsMode===m.key}"
           @click="switchMode(m.key)">
        {{ m.label }}
      </div>
    </div>

    <div class="chat-container" ref="chatRef">
      <div class="msg-list">
        <div v-for="(msg,i) in messages" :key="i"
             :class="['msg', msg.cls, {expanded: msg.expanded, 'has-play-btn': i===messages.length-1 && (msg.cls==='llm-token'||msg.cls==='bot') && (audioPlaying||audioPaused)}]">
          <template v-if="msg.cls==='rag'">
            <div class="rag-toggle-bar" @click="msg.expanded=!msg.expanded">
              <span class="rag-arrow">&#x25B6;</span> 参考来源
              <span class="rag-badge">{{ msg.docs.length }} 条</span>
            </div>
            <div class="rag-body">
              <div class="rag-item" v-for="(doc,j) in msg.docs" :key="j">
                <div class="rag-score">匹配度 {{ (doc.score*100).toFixed(1) }}%</div>
                <div class="rag-q">{{ doc.question }}</div>
                <div class="rag-a">{{ doc.answer }}</div>
              </div>
            </div>
          </template>
          <template v-else>
            <template v-if="msg.label"><span class="asr-label">{{ msg.label }}</span></template>
            {{ msg.text }}
            <div class="msg-play-btn" :class="{paused:audioPaused}"
                 v-if="i===messages.length-1 && (msg.cls==='llm-token'||msg.cls==='bot') && (audioPlaying||audioPaused)"
                 @click.stop="togglePause">
              {{ audioPaused ? '&#x25B6;' : '&#x23F8;' }}
            </div>
          </template>
        </div>
      </div>
    </div>

    <div class="text-input-bar">
      <input type="text" v-model="inputText" placeholder="输入健康问题或使用语音输入…"
             @keyup.enter="sendText" :disabled="status==='processing'" />
      <button @click="sendText" :disabled="status==='processing' || !inputText.trim()">发送</button>
    </div>

    <div class="bottom-bar">
      <div class="audio-controls">
        <div class="record-btn"
             :class="{recording:isRecording, disabled:status==='processing'}"
             @mousedown="startRec" @mouseup="stopRec"
             @mouseleave="stopRecIfRecording"
             @touchstart.prevent="startRec" @touchend.prevent="stopRec">
          {{ isRecording ? '&#x23F9;' : '&#x1F3A4;' }}
        </div>
      </div>
      <div class="status-line">
        <span class="status-dot" :class="statusClass"></span>
        {{ statusText }}
      </div>
      <div class="hint-text">按住说话 · 松手发送</div>
    </div>
    <div class="toast" v-if="toast.show" :class="toast.type">{{ toast.text }}</div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
